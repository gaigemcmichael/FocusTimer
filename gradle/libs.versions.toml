google-api-client-android = { group = "com.google.api-client", name = "google-api-client-android", version.ref = "googleApiClient" }
google-api-services-calendar = { group = "com.google.apis", name = "google-api-services-calendar", version.ref = "googleApiServicesCalendar" }
google-api-services-tasks = { group = "com.google.apis", name = "google-api-services-tasks", version.ref = "googleApiServicesTasks" }
google-http-client-gson = { group = "com.google.http-client", name = "google-http-client-gson", version = "1.46.0" }
mockito-core = { group = "org.mockito", name = "mockito-core", version.ref = "mockito" }
